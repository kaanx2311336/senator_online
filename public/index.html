<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senator Online - Roma Şehir Geliştirme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/ui.css">
  <style>
    body { margin: 0; overflow: hidden; }
    #game-canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  
  <!-- Main Menu Overlay -->
  <div id="roman-main-menu" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm roman-ui transition-opacity duration-500">
    <div class="bg-[url('/assets/marble-texture.jpg')] bg-[#f5f5dc] p-10 rounded-lg shadow-[0_0_20px_#ca8a04] border-4 border-[#eab308] text-center max-w-md w-full relative overflow-hidden">
      <!-- Decorative Corners -->
      <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-[#ca8a04]"></div>
      <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-[#ca8a04]"></div>
      <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-[#ca8a04]"></div>
      <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-[#ca8a04]"></div>

      <h1 class="text-4xl font-bold text-yellow-600 mb-2 tracking-widest uppercase" style="text-shadow: 1px 1px 2px #000;">Senator Online</h1>
      <p class="text-stone-700 italic mb-8">Roma'yı Yeniden İnşa Et</p>

      <div class="flex flex-col space-y-4">
        <button id="btn-start-game" class="bg-red-700 hover:bg-red-800 text-yellow-200 font-bold py-3 px-6 rounded border-2 border-yellow-500 shadow-lg transition-transform hover:scale-105 active:scale-95 uppercase tracking-wide">Oyuna Başla</button>
        <button id="btn-settings" class="bg-stone-800 hover:bg-stone-900 text-yellow-200 font-bold py-3 px-6 rounded border-2 border-yellow-500 shadow-lg transition-transform hover:scale-105 active:scale-95 uppercase tracking-wide">Ayarlar</button>
        <button id="btn-about" class="bg-stone-800 hover:bg-stone-900 text-yellow-200 font-bold py-3 px-6 rounded border-2 border-yellow-500 shadow-lg transition-transform hover:scale-105 active:scale-95 uppercase tracking-wide">Hakkında</button>
      </div>
    </div>
  </div>

  <!-- Settings Panel Overlay -->
  <div id="roman-settings-panel" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm roman-ui opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-[url('/assets/marble-texture.jpg')] bg-[#f5f5dc] p-8 rounded-lg shadow-[0_0_15px_#ca8a04] border-4 border-[#eab308] max-w-sm w-full relative">
      <h2 class="text-2xl font-bold text-yellow-600 mb-6 text-center border-b-2 border-yellow-500 pb-2">Ayarlar</h2>
      
      <div class="space-y-6">
        <!-- Sound Toggle -->
        <div class="flex justify-between items-center">
          <label for="setting-sound" class="text-stone-800 font-bold">Ses:</label>
          <button id="setting-sound-toggle" class="bg-green-700 text-yellow-100 px-4 py-1 rounded border border-yellow-500 hover:bg-green-800 transition-colors">Açık</button>
        </div>

        <!-- Volume Slider -->
        <div class="flex flex-col space-y-2">
          <label for="setting-volume" class="text-stone-800 font-bold flex justify-between">
            <span>Müzik Sesi:</span>
            <span id="volume-value">100%</span>
          </label>
          <input type="range" id="setting-volume" min="0" max="100" value="100" class="w-full accent-yellow-600">
        </div>

        <!-- Graphics Quality -->
        <div class="flex flex-col space-y-2">
          <label for="setting-graphics" class="text-stone-800 font-bold">Grafik Kalitesi:</label>
          <select id="setting-graphics" class="bg-stone-100 border border-yellow-500 text-stone-800 rounded p-2 focus:outline-none focus:ring-2 focus:ring-yellow-600">
            <option value="low">Düşük</option>
            <option value="medium">Orta</option>
            <option value="high" selected>Yüksek</option>
          </select>
        </div>

        <!-- Language Selection -->
        <div class="flex flex-col space-y-2">
          <label for="setting-language" class="text-stone-800 font-bold">Dil Seçimi:</label>
          <select id="setting-language" class="bg-stone-100 border border-yellow-500 text-stone-800 rounded p-2 focus:outline-none focus:ring-2 focus:ring-yellow-600">
            <option value="tr" selected>Türkçe (TR)</option>
            <option value="en">English (EN)</option>
          </select>
        </div>
      </div>

      <div class="mt-8 flex justify-center">
        <button id="btn-close-settings" class="bg-red-700 hover:bg-red-800 text-yellow-200 font-bold py-2 px-8 rounded border-2 border-yellow-500 transition-transform hover:scale-105 active:scale-95 uppercase">Kapat</button>
      </div>
    </div>
  </div>

  <!-- About Panel Overlay -->
  <div id="roman-about-panel" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm roman-ui opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-[url('/assets/marble-texture.jpg')] bg-[#f5f5dc] p-8 rounded-lg shadow-[0_0_15px_#ca8a04] border-4 border-[#eab308] max-w-md w-full relative text-center">
      <h2 class="text-2xl font-bold text-yellow-600 mb-4 border-b-2 border-yellow-500 pb-2">Hakkında</h2>
      <p class="text-stone-800 mb-4 leading-relaxed">
        <strong>Senator Online</strong>, antik Roma'nın ihtişamını web tarayıcınıza getiren bir şehir kurma simülasyonudur. Şehrinizi inşa edin, kaynaklarınızı yönetin ve imparatorluğun en büyük senatörü olun.
      </p>
      <p class="text-stone-600 text-sm mb-6">Sürüm 1.0.0<br>Geliştirici: AI Studio</p>
      <div class="flex justify-center">
        <button id="btn-close-about" class="bg-red-700 hover:bg-red-800 text-yellow-200 font-bold py-2 px-8 rounded border-2 border-yellow-500 transition-transform hover:scale-105 active:scale-95 uppercase">Kapat</button>
      </div>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/ui/mainMenu.js"></script>
  <script type="module" src="/js/ui/settingsPanel.js"></script>
</body>
</html>
