version: '3.8'

services:
  app:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=okey_password
      - DB_NAME=okey_online
      - JWT_SECRET=gizli_anahtar_okey_online_prod
      - CORS_ORIGIN=*
    depends_on:
      - db
    networks:
      - okey_network

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=okey_password
      - MYSQL_DATABASE=okey_online
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - okey_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - okey_network

volumes:
  db_data:

networks:
  okey_network:
    driver: bridge